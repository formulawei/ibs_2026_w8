<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IBS W8｜CAGE Distance, Semiglobalization & Global Value Chains</title>
<style>
/* ════════════════════════════════════════════
   NTU W8 palette — CAGE / GVC
   ════════════════════════════════════════════ */
:root{
  --ntu:#002B5C; --ntu2:#01356F; --gold:#C9A227;
  --paper:#F4F7FC; --ink:#0B1220; --muted:#475569;
  --muted2:#64748B; --line:#D7DEE9; --card:#FFFFFF;
  --shadow:0 10px 30px rgba(2,6,23,.10);
  --radius:16px; --radius2:20px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
  /* W8 segment colors */
  --s0:#0E4C3A;   /* Opening — deep teal-green */
  --t1:#7B2F00;   /* Ghemawat 2009 — brown */
  --t2:#1A4A8B;   /* CAGE — deep blue */
  --t3:#5B21B6;   /* GVC — purple */
  --c1:#0E7490;   /* Drama — cyan */
  --c2:#B45309;   /* Michelin / NPV case — amber */
  --s1:#065F46;   /* Memo — forest */
  /* CAGE dimension hues */
  --c-cult:#DC2626;  /* Cultural — red */
  --c-adm:#7C3AED;   /* Administrative — purple */
  --c-geo:#059669;   /* Geographic — green */
  --c-eco:#D97706;   /* Economic — amber */
  /* Auxiliary tokens (added v3) */
  --brand:#B45309;   /* ODM card accent — amber (distinct from --ntu brand-end cards) */
  --surface:#FBFCFE; /* Light surface background for nested panels */
  --green:#15803D;   /* Success/completed green */
  --sub:#94A3B8;     /* Neutral slate for scaffold/hint box borders */
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--sans);font-size:16px;color:var(--ink);
  background:radial-gradient(1200px 600px at 8% 0%,rgba(0,43,92,.07),transparent 55%),
             radial-gradient(900px 500px at 96% 4%,rgba(201,162,39,.10),transparent 55%),
             var(--paper);}

/* ── Topbar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:13px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(244,247,252,.94);backdrop-filter:blur(10px);z-index:20;}
.brand{display:flex;gap:12px;align-items:center;min-width:0;}
.logo{width:50px;height:50px;display:grid;place-items:center;border-radius:14px;
  background:linear-gradient(135deg,var(--ntu),var(--ntu2));color:#fff;
  font-weight:900;letter-spacing:.08em;box-shadow:0 8px 22px rgba(0,43,92,.28);font-size:13px;}
.brandText{min-width:0;}
.course{font-size:11px;color:var(--muted);letter-spacing:.03em;}
.topic{font-size:17px;font-weight:900;color:var(--ntu);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;
  font-weight:700;cursor:pointer;transition:.12s ease;font-size:13px;color:var(--ink);}
.btn:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.08);}
.btn:active{transform:translateY(1px);}
.btn.gold{border-color:rgba(201,162,39,.45);background:rgba(201,162,39,.12);color:#5A4600;}
.btn.primary{background:var(--ntu);color:#fff;border-color:var(--ntu);}
.btn.primary:hover{background:var(--ntu2);border-color:var(--ntu2);color:#fff;}

/* ── Utility rows / inline monospace (added v3) ── */
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.mono{font-family:var(--mono);font-weight:700;padding:1px 6px;border-radius:6px;
  background:rgba(0,43,92,.06);color:var(--ntu);font-size:.92em;}

/* ── General-purpose data table (added v3; used by .tbl) ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;background:var(--card);}
.tbl th,.tbl td{border:1px solid var(--line);padding:8px 10px;text-align:left;vertical-align:top;line-height:1.5;}
.tbl th{background:rgba(0,43,92,.06);color:var(--ntu);font-weight:800;font-size:12.5px;letter-spacing:.02em;}
.tbl tbody tr:nth-child(even){background:rgba(244,247,252,.55);}
.tbl tbody tr:hover{background:rgba(201,162,39,.06);}

/* ── Reveal box (toggle hints/export; added v3) ── */
.revealBox{display:none;}
.revealBox.visible{display:block;animation:fadeSlide .3s ease;}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:288px 1fr;gap:18px;padding:18px;
  max-width:1480px;margin:0 auto;}

/* ── Sidebar ── */
.sidebar{position:sticky;top:86px;align-self:start;
  border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.78);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:14px;
  max-height:calc(100vh - 104px);overflow-y:auto;}
.navTitle{font-size:10px;color:var(--muted);letter-spacing:.14em;
  text-transform:uppercase;margin-bottom:10px;padding:0 4px;}
.navItem{width:100%;text-align:left;padding:9px 11px;border-radius:11px;
  border:1px solid transparent;background:transparent;cursor:pointer;
  font-weight:700;font-size:13px;color:var(--ntu2);display:block;
  transition:.1s ease;margin-bottom:2px;line-height:1.35;}
.navItem:hover{background:rgba(0,43,92,.06);}
.navItem.active{background:rgba(0,43,92,.10);border-color:rgba(0,43,92,.18);}
.navItem.seg-s0.active{background:rgba(14,76,58,.10);border-color:rgba(14,76,58,.25);color:var(--s0);}
.navItem.seg-t1.active{background:rgba(123,47,0,.10);border-color:rgba(123,47,0,.25);color:var(--t1);}
.navItem.seg-t2.active{background:rgba(26,74,139,.10);border-color:rgba(26,74,139,.25);color:var(--t2);}
.navItem.seg-t3.active{background:rgba(91,33,182,.10);border-color:rgba(91,33,182,.25);color:var(--t3);}
.navItem.seg-c1.active{background:rgba(14,116,144,.10);border-color:rgba(14,116,144,.25);color:var(--c1);}
.navItem.seg-c2.active{background:rgba(180,83,9,.10);border-color:rgba(180,83,9,.25);color:var(--c2);}
.navItem.seg-s1.active{background:rgba(6,95,70,.10);border-color:rgba(6,95,70,.25);color:var(--s1);}
.navFooter{margin-top:12px;padding-top:12px;border-top:1px dashed var(--line);}
.hint{font-size:11px;color:var(--muted);line-height:1.5;}
.kbd{font-family:var(--mono);font-weight:900;padding:2px 6px;
  border:1px solid var(--line);border-radius:7px;background:#fff;
  color:var(--muted);font-size:10px;}

/* ── Content ── */
.content{border:1px solid var(--line);border-radius:var(--radius2);
  background:rgba(255,255,255,.88);backdrop-filter:blur(8px);
  box-shadow:var(--shadow);padding:24px;min-height:calc(100vh - 160px);}
.sectionHead{display:flex;align-items:flex-start;justify-content:space-between;
  gap:14px;margin-bottom:20px;}
.h1{font-size:27px;font-weight:900;color:var(--ntu);margin:0;line-height:1.18;}
.sub{margin:6px 0 0;color:var(--muted);line-height:1.5;font-size:15px;}
.tag{display:inline-flex;align-items:center;gap:8px;
  border:1px solid rgba(0,43,92,.25);background:rgba(0,43,92,.08);
  color:var(--ntu);padding:8px 14px;border-radius:999px;
  font-weight:800;white-space:nowrap;font-size:13px;}

/* time tracker */
.timeTracker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.timePill{font-size:11px;font-weight:800;padding:5px 10px;border-radius:999px;
  border:1px solid var(--line);background:#fff;color:var(--muted);}
.timePill.s0{background:var(--s0);color:#fff;border-color:var(--s0);}
.timePill.t1{background:var(--t1);color:#fff;border-color:var(--t1);}
.timePill.t2{background:var(--t2);color:#fff;border-color:var(--t2);}
.timePill.t3{background:var(--t3);color:#fff;border-color:var(--t3);}
.timePill.c1{background:var(--c1);color:#fff;border-color:var(--c1);}
.timePill.c2{background:var(--c2);color:#fff;border-color:var(--c2);}
.timePill.s1{background:var(--s1);color:#fff;border-color:var(--s1);}
.timePill.cur{opacity:1!important;}

/* ── Cards / Grid ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.card{border:1px solid var(--line);border-radius:var(--radius);
  background:var(--card);padding:16px;box-shadow:0 6px 18px rgba(0,0,0,.06);}
.cardTitle{font-weight:900;color:var(--ntu);margin:0 0 10px;font-size:15px;}
.p{margin:0;color:var(--ink);line-height:1.65;font-size:15px;}
.ul{margin:8px 0 0 20px;color:var(--ink);line-height:1.65;font-size:15px;}
.ul li{margin-bottom:5px;}
.sm{font-size:13px;color:var(--muted);}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0;}

/* ── Callout ── */
.callout{border-left:5px solid var(--ntu);padding:12px 14px;
  background:rgba(0,43,92,.05);border-radius:12px;margin:10px 0;line-height:1.6;}
.callout.gold{border-color:var(--gold);background:rgba(201,162,39,.08);}
.callout.green{border-color:#15803d;background:rgba(21,128,61,.06);}
.callout.purple{border-color:#7C3AED;background:rgba(124,58,237,.06);}
.callout.red{border-color:#DC2626;background:rgba(220,38,38,.05);}
.callout.orange{border-color:#B45309;background:rgba(180,83,9,.07);}
.callout.teal{border-color:#0E7490;background:rgba(14,116,144,.06);}
.callout strong{color:var(--ntu);}
.callout.gold strong{color:#7C5500;}
.callout.green strong{color:#14532D;}
.callout.purple strong{color:#5B21B6;}
.callout.red strong{color:#991B1B;}
.callout.orange strong{color:#7C2D12;}
.callout.teal strong{color:#164E63;}

/* ── Pill row ── */
.pillRow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.pill{border:1px solid var(--line);background:#fff;border-radius:999px;
  padding:6px 11px;font-weight:700;font-size:13px;
  display:flex;align-items:center;gap:6px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.dot.b{background:var(--ntu);}
.dot.g{background:#15803d;}
.dot.p{background:#7C3AED;}
.dot.r{background:#DC2626;}
.dot.o{background:#B45309;}
.dot.t{background:#0E7490;}

/* ── Poll / Quiz ── */
.qBox{border:1.5px dashed rgba(0,43,92,.28);background:rgba(0,43,92,.03);
  border-radius:14px;padding:14px;}
.qTitle{font-weight:900;margin:0 0 10px;color:var(--ntu);font-size:15px;}
.options{display:grid;gap:8px;}
.opt{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;
  cursor:pointer;font-weight:700;text-align:left;transition:.1s ease;
  font-size:14px;color:var(--ink);}
.opt:hover{border-color:rgba(0,43,92,.35);box-shadow:0 6px 16px rgba(0,0,0,.07);}
.opt.chosen{border-color:rgba(0,43,92,.50);background:rgba(0,43,92,.06);}
.opt.correct{border-color:#15803d;background:rgba(21,128,61,.09);color:#14532d;}
.opt.wrong{border-color:#DC2626;background:rgba(220,38,38,.07);color:#7f1d1d;}
.opt[disabled]{cursor:default;}
.barWrap{display:flex;align-items:center;gap:8px;margin-top:8px;}
.bar{height:11px;border-radius:999px;background:rgba(0,0,0,.06);
  overflow:hidden;flex:1;border:1px solid var(--line);}
.fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),var(--ntu));
  transition:width .4s ease;}
.smallVote{color:var(--muted);font-size:12px;font-family:var(--mono);}

/* ── Sliders ── */
.sliderRow{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin:10px 0;}
input[type=range]{width:min(340px,100%);accent-color:var(--ntu);cursor:pointer;}
.valBadge{font-family:var(--mono);font-weight:800;padding:5px 10px;
  border:1px solid var(--line);border-radius:10px;background:#fff;
  font-size:14px;color:var(--ntu);}

/* ── Game containers ── */
.gameBox{border:2px solid var(--line);border-radius:var(--radius);
  padding:20px;background:var(--card);box-shadow:var(--shadow);margin:14px 0;}
.gameTitle{font-weight:900;font-size:15px;color:var(--ntu);margin-bottom:6px;
  display:flex;align-items:center;gap:8px;}
.gameTag{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  padding:3px 10px;border-radius:999px;background:rgba(0,43,92,.1);color:var(--ntu);}
.gameInstr{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.55;}
.gameReveal{border-left:4px solid var(--gold);background:rgba(201,162,39,.06);
  border-radius:0 10px 10px 0;padding:12px 14px;font-size:13px;line-height:1.6;
  display:none;margin-top:12px;}
.gameReveal.visible{display:block;animation:fadeSlide .35s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.gameBtnRow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.gameBtn{border:1.5px solid var(--line);background:#fff;border-radius:999px;
  padding:8px 16px;font-weight:700;cursor:pointer;transition:.12s;font-size:13px;}
.gameBtn:hover{border-color:var(--ntu);color:var(--ntu);}
.gameBtn.primary{background:var(--ntu);color:#fff;border-color:var(--ntu);}
.gameBtn.primary:hover{background:#01356F;}
.gameBtn.success{background:#14532D;color:#fff;border-color:#14532D;}

/* ── Classify drag-drop (CAGE buckets) ── */
.classifyRow{display:flex;gap:10px;flex-wrap:wrap;}
.classifyCol{flex:1;min-width:170px;border:2px dashed var(--line);
  border-radius:14px;padding:12px;min-height:120px;transition:.15s;}
.classifyCol.over{border-color:var(--ntu);background:rgba(0,43,92,.04);}
.classifyColTitle{font-weight:900;font-size:12px;text-align:center;
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.classifyCol[data-cat="cultural"]{border-color:rgba(220,38,38,.45);}
.classifyCol[data-cat="cultural"] .classifyColTitle{color:var(--c-cult);}
.classifyCol[data-cat="admin"]{border-color:rgba(124,58,237,.45);}
.classifyCol[data-cat="admin"] .classifyColTitle{color:var(--c-adm);}
.classifyCol[data-cat="geo"]{border-color:rgba(5,150,105,.45);}
.classifyCol[data-cat="geo"] .classifyColTitle{color:var(--c-geo);}
.classifyCol[data-cat="eco"]{border-color:rgba(217,119,6,.45);}
.classifyCol[data-cat="eco"] .classifyColTitle{color:var(--c-eco);}
.classifyChip{border:1.5px solid var(--line);background:#fff;border-radius:10px;
  padding:8px 10px;cursor:grab;font-weight:700;font-size:12px;
  color:var(--ink);user-select:none;transition:.1s ease;
  margin-bottom:6px;line-height:1.4;}
.classifyChip:hover{border-color:rgba(0,43,92,.40);}
.classifyChip.correct-chip{border-color:#15803d;background:rgba(21,128,61,.09);}
.classifyChip.wrong-chip{border-color:#DC2626;background:rgba(220,38,38,.06);}
.classifyBank{display:flex;gap:8px;flex-wrap:wrap;min-height:50px;
  padding:10px;border:2px dashed rgba(0,43,92,.18);border-radius:12px;
  background:rgba(0,43,92,.02);margin-bottom:10px;}

/* ── CAGE heat map ── */
.cageMap{width:100%;border-collapse:collapse;margin:14px 0;font-size:12px;}
.cageMap th,.cageMap td{border:1px solid var(--line);padding:8px 6px;text-align:center;vertical-align:middle;}
.cageMap th{background:rgba(0,43,92,.06);color:var(--ntu);font-weight:900;font-size:11px;}
.cageMap td{cursor:pointer;transition:.15s;}
.cageMap td:hover{background:rgba(201,162,39,.15);}
.cageMap td.sel{outline:3px solid var(--gold);outline-offset:-3px;font-weight:900;}
.cageMap .low{background:rgba(21,128,61,.12);color:#14532d;}
.cageMap .mid{background:rgba(217,119,6,.12);color:#7C2D12;}
.cageMap .high{background:rgba(220,38,38,.15);color:#991b1b;}
.cageMap .qm{background:rgba(148,163,184,.18);color:#334155;font-style:italic;}

/* ── AAA picker ── */
.aaaGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:12px 0;}
.aaaCard{border:2px solid var(--line);border-radius:14px;padding:14px;
  cursor:pointer;text-align:left;transition:.15s;background:#fff;}
.aaaCard:hover{border-color:rgba(0,43,92,.35);}
.aaaCard.chosen{border-color:var(--ntu);background:rgba(0,43,92,.04);box-shadow:0 6px 18px rgba(0,43,92,.12);}
.aaaIcon{font-size:30px;display:block;margin-bottom:8px;}
.aaaLabel{font-weight:900;font-size:14px;color:var(--ntu);margin-bottom:4px;}
.aaaDesc{font-size:11.5px;color:var(--muted);line-height:1.5;}

/* ── GVC governance mode picker ── */
.gvcRow{display:flex;gap:6px;margin:12px 0;overflow-x:auto;padding-bottom:6px;}
.gvcCard{flex:1;min-width:120px;border:2px solid var(--line);border-radius:12px;
  padding:10px 8px;cursor:pointer;text-align:center;transition:.15s;background:#fff;}
.gvcCard:hover{border-color:rgba(91,33,182,.40);}
.gvcCard.chosen{border-color:var(--t3);background:rgba(91,33,182,.06);
  box-shadow:0 6px 18px rgba(91,33,182,.14);}
.gvcLabel{font-weight:900;font-size:12px;color:var(--t3);margin-bottom:4px;}
.gvcBar{height:6px;border-radius:999px;margin:6px 0 4px;
  background:linear-gradient(90deg,#10b981,#f59e0b,#ef4444);}
.gvcTag{font-size:10px;color:var(--muted);font-weight:700;}

/* ── Scenario Flipper ── */
.sceneFlipper{border:1.5px solid var(--line);border-radius:16px;overflow:hidden;margin:14px 0;}
.sceneNav{display:flex;border-bottom:1px solid var(--line);}
.sceneTab{flex:1;padding:10px 6px;font-weight:800;font-size:12px;cursor:pointer;
  text-align:center;color:var(--muted);transition:.1s ease;border-right:1px solid var(--line);}
.sceneTab:last-child{border-right:none;}
.sceneTab.active{background:var(--c1);color:#fff;}
.sceneTab:hover:not(.active){background:rgba(14,116,144,.08);}
.sceneBody{padding:18px;}

/* ── Memo Scaffold ── */
.memoScaffold{display:flex;flex-direction:column;gap:14px;margin:10px 0;}
.memoLayer{border-left:4px solid var(--line);padding:12px 14px;border-radius:0 10px 10px 0;
  background:rgba(244,247,252,.5);transition:.15s;}
.memoLayer:focus-within{background:#fff;}
.memoLayer.l1{border-color:var(--t2);}
.memoLayer.l2{border-color:var(--t1);}
.memoLayer.l3{border-color:var(--t3);}
.memoLayer.l4{border-color:var(--s1);}
.memoLayerLabel{font-weight:900;font-size:13px;margin-bottom:4px;}
.memoPrompt{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5;}
.memoField{width:100%;border:1.5px dashed var(--line);border-radius:8px;padding:10px 12px;
  font-size:13px;font-family:var(--sans);resize:vertical;min-height:80px;
  background:transparent;color:var(--ink);transition:.15s;}
.memoField:focus{outline:none;border-color:var(--t3);border-style:solid;background:#fff;}
.memoField.has-content{border-style:solid;border-color:var(--gold);}
.memoWordCount{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}

/* ── NPV calculator ── */
.npvBox{border:2px solid var(--c2);border-radius:16px;padding:18px;
  background:linear-gradient(180deg,rgba(180,83,9,.04),rgba(180,83,9,.01));
  margin:12px 0;}
.npvGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.npvInput{display:flex;flex-direction:column;gap:4px;
  background:#fff;border:1px solid var(--line);border-radius:10px;padding:10px;}
.npvInputLabel{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.03em;}
.npvInputRow{display:flex;align-items:center;gap:10px;}
.npvValue{font-family:var(--mono);font-weight:900;color:var(--c2);font-size:15px;
  min-width:80px;text-align:right;}
.npvResult{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px;}
.npvResultCard{background:#fff;border:1.5px solid var(--c2);border-radius:12px;padding:12px;text-align:center;}
.npvResultLabel{font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase;}
.npvResultValue{font-family:var(--mono);font-weight:900;font-size:22px;color:var(--c2);margin-top:4px;}
.npvDecisionGood{color:#15803d!important;}
.npvDecisionBad{color:#DC2626!important;}

// CJK-aware word counter (added v3)
// - Counts each CJK ideograph as 1 "word"
// - Counts space-separated runs of Latin/digits as 1 "word"
function countWords(text){
  if(!text||!text.trim()) return 0;
  const s = text.trim();
  const cjk = (s.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g)||[]).length;
  const latin = s.replace(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g," ").trim();
  const latinWords = latin ? latin.split(/\s+/).filter(Boolean).length : 0;
  return cjk + latinWords;
}

// ═══ POLL helpers ═══
function getPoll(k){return ST.polls[k]||{a:0,b:0,c:0,d:0,e:0,choice:null};}
function vote(k,ch){const p=getPoll(k);if(p.choice)p[p.choice]=Math.max(0,(p[p.choice]||0)-1);p.choice=ch;p[ch]=(p[ch]||0)+1;ST.polls[k]=p;save();}
function tot(p){return(p.a||0)+(p.b||0)+(p.c||0)+(p.d||0)+(p.e||0);}
function pct(p,k){const t=tot(p);return t?Math.round((p[k]||0)/t*100):0;}

function pollCard({key,title,title_en,opts,followup,followup_en}){

  </div>`;
}

function quizCard({key,q,q_en,opts,ans,exp,exp_en}){

// ═══ NPV calculator (Michelin Project Gemini, simplified) ═══
// Anchored to case teaching-note numbers (Michelin production capacity decision):
//   base case @ 7.75% (agriculture β) → NPV ≈ $26.6M, IRR ≈ 12.6%
//   @ 9.83% (auto β) → NPV ≈ $10.9M ; @ 10.30% (tire β) → NPV ≈ $13.5M
// We reproduce a stylized FCF path that matches those anchors.
// Approach: sketch 10-year incremental FCF, add terminal recovery of NWC+NBV.
function updateNpv(){
  const p=ST.npv;
  // Incremental OE track production ramp 2023-2032 (from TN Ex 2, thousands rounded)
  const incOE  = [0,0,623,2931,6604,8823,10485,12157,13582,13582];
  const incRT  = [0,0,391,1813,2807,3174,3186,3216,3036,3016];
  // Prices: OE $8000, RT $6000, escalated at inflation-0.5%
  const infl = [0.041,0.030,0.029,0.033,0.022,0.018,0.022,0.022,0.023,0.023]; // 2023-2032
  let pOE=8000, pRT=6000, pMat=3000, pProd=2000, pLog=500;
  const matF=[], prodF=[], logF=[], revF=[];
  for(let y=0;y<10;y++){
    if(y>0){ pOE*=(1+infl[y-1]); pRT*=(1+infl[y-1]); pMat*=(1+infl[y-1]); pProd*=(1+infl[y-1]-0.005); pLog*=(1+infl[y-1]); }
    revF[y] = incOE[y]*pOE + incRT[y]*pRT;
    matF[y] = (incOE[y]+incRT[y])*pMat;
    prodF[y]= (incOE[y]+incRT[y])*pProd;
    logF[y] = (incOE[y]+incRT[y])*pLog;
  }
  // Production efficiency gains on EXISTING 40k/yr production (stylized, net of capex)
  // TN Exhibit 9 implies modest savings: ~1% of production cost post-upgrade, held constant.
  // We model 0, 0.5%, 1.0%, 1.5% ramp then flat 1.5% cumulative.
  const cumEff=[0,0,0.005,0.010,0.015,0.015,0.015,0.015,0.015,0.015];
  const existingProd = 40000; // tracks/yr existing capacity
  const savingsOnExisting = cumEff.map((c,y)=> p.eff ? existingProd*pProd*c : 0);
  // Capex + opex schedule (2022-2025 = years -1,0,1,2 of the project window)
  // In our 10-year 2023-2032 window, the heavy capex is 2023-2025
  const capex    = [30000000, 40000000, 27000000, 0,0,0,0,0,0,0];
  const buildCap = [10000000, 10000000, 0, 0,0,0,0,0,0,0];
  const equipCap = [20000000, 30000000, 27000000, 0,0,0,0,0,0,0];
  const nrOpex   = [530000, 485000, 200000, 0,0,0,0,0,0,0];
  // Depreciation: building 1/25, equipment 1/15, cumulative
  const depr = [];
  let bCum=3000000, eCum=0;
  for(let y=0;y<10;y++){
    bCum += buildCap[y];
    eCum += equipCap[y];
    depr[y] = bCum/25 + eCum/15;
  }
  const recurOpex = revF.map(r=>0.015*r); // SG&A + warranty + commissions (~1.5% of rev, per TN)
  // Carbon cost: energy ramp (MWh): elec 0,0,1808,3617,5425,7233,9042,10572,10850,10850 ; thermal 0,0,1692,3383,5075,6767,8458,10150,10150,10150
  const elec    = [0,0,1808,3617,5425,7233,9042,10572,10850,10850];
  const thermal = [0,0,1692,3383,5075,6767,8458,10150,10150,10150];
  const carbonCost = elec.map((e,y)=> (e*0.510 + thermal[y]*0.202) * p.carbon );
  // NWC investment: 20% of ΔRevenue each year (per TN methodology). Recovered at terminal.
  const deltaNwc = revF.map((r,y)=> 0.20 * (r - (y>0?revF[y-1]:0)) );
  const totalNwc = deltaNwc.reduce((a,b)=>a+b,0);
  // FCF per year
  const r = p.disc/100;
  const T = 0.25;
  let npvSum = 0;
  const rows = [];
  for(let y=0;y<10;y++){
    const rev = revF[y];
    const varCost = matF[y] + prodF[y] + logF[y];
    const savExist = savingsOnExisting[y];
    const ebit  = rev - varCost - recurOpex[y] - nrOpex[y] - depr[y] + savExist;
    const ebiat = ebit * (1 - T);
    const fcfOp = ebiat + depr[y] - capex[y] - deltaNwc[y];
    const fcfCarbon = -carbonCost[y] * (1-T);
    const fcf = fcfOp + fcfCarbon;
    const disc = Math.pow(1+r, y+1); // year 2023 discounted by (1+r)^1 from 2022 NPV date
    npvSum += fcf / disc;
    rows.push({y:2023+y, rev, ebit, fcf, fcfCarbon, disc, pv:fcf/disc});
  }
  // Terminal recovery at end 2032: NWC release + residual PP&E book value. Stylized.
  const bookVal = 15000000; // residual PP&E book value after 10y depreciation
  const termRecovery = bookVal + totalNwc; // NWC recovered at end
  const termDisc = Math.pow(1+r, 10);
  npvSum += termRecovery / termDisc;

  // IRR via bisection on the cashflow stream
  function npvAtRate(rate){
    let s = 0;
    for(let i=0;i<rows.length;i++) s += rows[i].fcf / Math.pow(1+rate,i+1);
    s += termRecovery / Math.pow(1+rate,10);
    return s;
  }
  let lo=0.001, hi=0.40;
  for(let i=0;i<60;i++){ const m=(lo+hi)/2; if(npvAtRate(m)>0) lo=m; else hi=m; }
  const irr = (lo+hi)/2 * 100;

  // Carbon-only NPV (separate total)
  let carbonNpv = 0;
  for(let y=0;y<10;y++){ carbonNpv += (-carbonCost[y]*(1-T)) / Math.pow(1+r, y+1); }

  const fmt = v => (Math.abs(v)>=1e9)?(v/1e9).toFixed(2)+"B":(Math.abs(v)>=1e6)?(v/1e6).toFixed(1)+"M":(Math.abs(v)>=1e3)?(v/1e3).toFixed(0)+"K":v.toFixed(0);
  const zh = ST.lang==="zh";
  const box = document.getElementById("npvResultBox");
  if(!box) return;
  box.innerHTML = `
    <div class="npvResultCard">
      <div class="npvResultLabel">${zh?"專案 NPV（含碳）":"Project NPV (incl. carbon)"}</div>
      <div class="npvResultValue ${npvSum>=0?'npvDecisionGood':'npvDecisionBad'}">${npvSum>=0?'+':'-'}$${fmt(Math.abs(npvSum))}</div>
      <div class="sm" style="margin-top:4px;">@ ${p.disc.toFixed(2)}% ${zh?"折現率":"disc. rate"}</div>
    </div>
    <div class="npvResultCard">
      <div class="npvResultLabel">IRR</div>
      <div class="npvResultValue ${irr>=p.disc?'npvDecisionGood':'npvDecisionBad'}">${irr.toFixed(1)}%</div>
      <div class="sm" style="margin-top:4px;">vs ${p.disc.toFixed(2)}% ${zh?"要求報酬":"hurdle"}</div>
    </div>
    <div class="npvResultCard">
      <div class="npvResultLabel">${zh?"碳成本 NPV（單獨）":"Carbon NPV (isolated)"}</div>
      <div class="npvResultValue" style="color:#7C2D12;">-$${fmt(Math.abs(carbonNpv))}</div>
      <div class="sm" style="margin-top:4px;">@ $${p.carbon.toFixed(0)}/tCO₂</div>
    </div>`;
  // update slider displayed values
  const valDisc=document.getElementById("npvVal_disc");
  if(valDisc) valDisc.textContent = p.disc.toFixed(2)+"%";
  const valCarb=document.getElementById("npvVal_carbon");
  if(valCarb) valCarb.textContent = "$"+p.carbon.toFixed(0);
  const valEff=document.getElementById("npvVal_eff");
  if(valEff) valEff.textContent = p.eff ? (zh?"含":"ON") : (zh?"不含":"OFF");
  // FCF row highlight
  const fcfBody = document.getElementById("fcfTableBody");
  if(fcfBody){
    fcfBody.innerHTML = rows.map(r=>`<tr>
      <td style="font-weight:800;">${r.y}</td>
      <td style="text-align:right;">$${fmt(r.rev)}</td>
      <td style="text-align:right;">$${fmt(r.ebit)}</td>
      <td style="text-align:right;color:#7C2D12;">-$${fmt(Math.abs(r.fcfCarbon))}</td>
      <td style="text-align:right;font-weight:800;color:${r.fcf>=0?'#14532D':'#7f1d1d'};">$${fmt(r.fcf)}</td>
      <td style="text-align:right;color:#475569;">$${fmt(r.pv)}</td>
    </tr>`).join("");
  }
  // Sensitivity table: NPV at 3 canonical discount rates (7.75% / 9.83% / 10.30%)
  const sensBody = document.getElementById("sensTableBody");
  if(sensBody){
    const rates = [
      {r:7.75, lab_zh:"農業 β=0.83（本案推薦）", lab_en:"Agriculture β=0.83 (recommended)"},
      {r:9.83, lab_zh:"汽車 β=1.24（若依汽車分部）", lab_en:"Auto β=1.24 (if auto segment)"},
      {r:10.30,lab_zh:"輪胎 β=1.34（整體集團）", lab_en:"Tire β=1.34 (whole group)"}
    ];
    sensBody.innerHTML = rates.map(rr=>{
      const rate = rr.r/100;
      let s=0;
      for(let i=0;i<rows.length;i++) s += rows[i].fcf / Math.pow(1+rate, i+1);
      s += termRecovery / Math.pow(1+rate, 10);
      const decision = s>=0 ? (zh?"接受":"Accept") : (zh?"否決":"Reject");
      const col = s>=0 ? "#14532D" : "#7F1D1D";
      return `<tr>
        <td>${zh?rr.lab_zh:rr.lab_en}</td>
        <td style="text-align:right;">${rr.r.toFixed(2)}%</td>
        <td style="text-align:right;font-weight:800;color:${col};">${s>=0?'+':'-'}$${fmt(Math.abs(s))}</td>
        <td style="font-weight:700;color:${col};">${decision}</td>
      </tr>`;
    }).join("");
  }
  // Plain-language summary line
  const sumBox = document.getElementById("npvSummaryLine");
  if(sumBox){
    const go = npvSum>=0;
    sumBox.innerHTML = zh
      ? `以 <strong>${p.disc.toFixed(2)}%</strong> 折現、碳價 <strong>$${p.carbon}/tCO₂</strong>、效率升級 <strong>${p.eff?"已":"未"}</strong>計入，本案 NPV = <strong style="color:${go?'#14532D':'#7F1D1D'};">${go?'+':'-'}$${fmt(Math.abs(npvSum))}</strong>，IRR = <strong>${irr.toFixed(1)}%</strong>。→ <strong style="color:${go?'#14532D':'#7F1D1D'};">${go?"接受 Project Gemini":"否決 Project Gemini"}</strong>`
      : `At discount <strong>${p.disc.toFixed(2)}%</strong>, carbon price <strong>$${p.carbon}/tCO₂</strong>, efficiency upgrade <strong>${p.eff?"INCLUDED":"EXCLUDED"}</strong>, the project NPV = <strong style="color:${go?'#14532D':'#7F1D1D'};">${go?'+':'-'}$${fmt(Math.abs(npvSum))}</strong>, IRR = <strong>${irr.toFixed(1)}%</strong>. → <strong style="color:${go?'#14532D':'#7F1D1D'};">${go?"ACCEPT Project Gemini":"REJECT Project Gemini"}</strong>`;
  }

  // ══ Breakeven display (IRR is the breakeven discount rate) ══
  const beBox = document.getElementById("breakevenBox");
  if(beBox){
    const delta = irr - p.disc;
    const robust = delta >= 3 ? (zh?"穩健":"Robust") : (delta >= 1 ? (zh?"邊緣":"Marginal") : (zh?"危險":"Fragile"));
    const robustCol = delta >= 3 ? "#14532D" : (delta >= 1 ? "#B45309" : "#991B1B");
    beBox.innerHTML = `<span style="font-size:28px;">${irr.toFixed(2)}%</span>
      <span style="font-size:13px;color:var(--muted);font-weight:600;font-family:var(--sans);margin-left:8px;">${zh?"（目前 WACC ":"(current WACC "}${p.disc.toFixed(2)}%, <span style="color:${robustCol};">Δ ${delta>=0?'+':''}${delta.toFixed(2)}pp · ${robust}</span>）</span>`;
  }

  // ══ Sustainability path NPV contributions (live-linked to ⑦) ══
  const s1El = document.getElementById("sust1");
  if(s1El){ s1El.textContent = (carbonNpv>=0?"+":"−")+"$"+fmt(Math.abs(carbonNpv)); }
  const s2El = document.getElementById("sust2");
  if(s2El){
    // Approximate: sum discounted efficiency savings × (1-T)
    let effNpv = 0;
    if(p.eff){
      // existingProd × pProd × cumEff × (1-T) per year minus $9.6M upfront
      // We replicate the path above
      const cumEff2=[0,0,0.005,0.010,0.015,0.015,0.015,0.015,0.015,0.015];
      let pProd2 = 2000;
      const infl2 = [0.041,0.030,0.029,0.033,0.022,0.018,0.022,0.022,0.023,0.023];
      for(let y=0;y<10;y++){
        if(y>0) pProd2*=(1+infl2[y-1]-0.005);
        const save = 40000 * pProd2 * cumEff2[y] * (1-T);
        effNpv += save / Math.pow(1+r, y+1);
      }
      effNpv -= 9600000;  // Green upgrade capex assumed in Y1 (approximate: no discounting)
    }
    s2El.textContent = (effNpv>=0?"+":"−")+"$"+fmt(Math.abs(effNpv));
  }

  // Snapshot count updater
  const snapCt = document.getElementById("snapCount");
  if(snapCt) snapCt.textContent = String(ST.c2Snapshots.length);
}

// ══ Compute NPV+IRR for snapshot saving (reuses updateNpv's logic in standalone form) ══
function computeNpvSnapshot(npv){
  const incOE = [0,0,623,2931,6604,8823,10485,12157,13582,13582];
  const incRT = [0,0,391,1813,2807,3174,3186,3216,3036,3016];
  const infl  = [0.041,0.030,0.029,0.033,0.022,0.018,0.022,0.022,0.023,0.023];
  let pOE=8000, pRT=6000, pMat=3000, pProd=2000, pLog=500;
  const revF=[], matF=[], prodF=[], logF=[];
  for(let y=0;y<10;y++){
    if(y>0){ pOE*=(1+infl[y-1]); pRT*=(1+infl[y-1]); pMat*=(1+infl[y-1]); pProd*=(1+infl[y-1]-0.005); pLog*=(1+infl[y-1]); }
    revF[y] = incOE[y]*pOE + incRT[y]*pRT;
    matF[y] = (incOE[y]+incRT[y])*pMat;
    prodF[y]= (incOE[y]+incRT[y])*pProd;
    logF[y] = (incOE[y]+incRT[y])*pLog;
  }
  const cumEff=[0,0,0.005,0.010,0.015,0.015,0.015,0.015,0.015,0.015];
  const savingsOnExisting = cumEff.map((cc,y)=> npv.eff ? 40000*pProd*cc : 0);
  const capex = [30000000,40000000,27000000,0,0,0,0,0,0,0];
  const buildCap = [10000000,10000000,0,0,0,0,0,0,0,0];
  const equipCap = [20000000,30000000,27000000,0,0,0,0,0,0,0];
  const nrOpex = [530000,485000,200000,0,0,0,0,0,0,0];
  const depr=[]; let bCum=3000000, eCum=0;
  for(let y=0;y<10;y++){ bCum+=buildCap[y]; eCum+=equipCap[y]; depr[y]=bCum/25+eCum/15; }
  const recurOpex = revF.map(rv=>0.015*rv);
  const elec=[0,0,1808,3617,5425,7233,9042,10572,10850,10850];
  const thermal=[0,0,1692,3383,5075,6767,8458,10150,10150,10150];
  const carbonCost = elec.map((e,y)=> (e*0.510+thermal[y]*0.202)*npv.carbon);
  const deltaNwc = revF.map((rv,y)=> 0.20*(rv-(y>0?revF[y-1]:0)));
  const totalNwc = deltaNwc.reduce((a,b)=>a+b,0);
  const r = npv.disc/100, T=0.25;
  const fcfs=[];
  let npvSum=0;
  for(let y=0;y<10;y++){
    const rv=revF[y], varCost=matF[y]+prodF[y]+logF[y], savExist=savingsOnExisting[y];
    const ebit = rv-varCost-recurOpex[y]-nrOpex[y]-depr[y]+savExist;
    const ebiat = ebit*(1-T);
    const fcfOp = ebiat+depr[y]-capex[y]-deltaNwc[y];
    const fcfC = -carbonCost[y]*(1-T);
    const fcf = fcfOp + fcfC;
    fcfs.push(fcf);
    npvSum += fcf / Math.pow(1+r, y+1);
  }
  const termRecovery = 15000000 + totalNwc;
  npvSum += termRecovery / Math.pow(1+r, 10);
  // IRR via bisection
  let lo=0.001, hi=0.40;
  for(let i=0;i<60;i++){
    const m=(lo+hi)/2;
    let s=0;
    for(let y=0;y<10;y++) s += fcfs[y] / Math.pow(1+m,y+1);
    s += termRecovery / Math.pow(1+m,10);
    if(s>0) lo=m; else hi=m;
  }
  return { npv: npvSum, irr: (lo+hi)/2*100 };
}

// Keyboard nav
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT") return;
  const i=VIEW_ORDER.indexOf(ST.view);
  if(e.key==="ArrowRight"&&i<VIEW_ORDER.length-1){ST.view=VIEW_ORDER[i+1];save();render();content.scrollTop=0;}
  if(e.key==="ArrowLeft"&&i>0){ST.view=VIEW_ORDER[i-1];save();render();content.scrollTop=0;}
  if(e.key==="l"||e.key==="L"){ST.lang=ST.lang==="zh"?"en":"zh";save();render();}
  if(e.key==="p"||e.key==="P"){ST.presenter=!ST.presenter;document.body.classList.toggle("presenter",ST.presenter);save();}
  if(e.key==="r"||e.key==="R"){if(confirm("Reset all state?")){localStorage.removeItem(STORE);ST={...DEF};render();}}
});
